name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: lfo-webui-linux
            asset_name: lfo-webui-linux-x64.tar.gz
            path_separator: ":"
          - os: windows-latest
            artifact_name: lfo-webui-windows
            asset_name: lfo-webui-windows-x64.zip
            path_separator: ";"
          - os: macos-latest
            artifact_name: lfo-webui-macos
            asset_name: lfo-webui-macos-x64.tar.gz
            path_separator: ":"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel
          pip install .
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --name lfo-webui \
            --onedir \
            --console \
            --add-data "prompts${{ matrix.path_separator }}prompts" \
            --add-data "configs${{ matrix.path_separator }}configs" \
            --hidden-import streamlit \
            --hidden-import openai \
            --collect-all streamlit \
            src/llm_folder_organizer/webui.py

      - name: Package Linux/macOS
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd dist
          tar -czf ${{ matrix.asset_name }} lfo-webui/
          cd ..

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path lfo-webui -DestinationPath ${{ matrix.asset_name }}
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
