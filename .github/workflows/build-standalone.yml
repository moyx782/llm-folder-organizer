name: build-standalone

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: lfo-webui-Linux
            archive_ext: tar.gz
          - os: windows-latest
            artifact_name: lfo-webui-Windows
            archive_ext: zip
          - os: macos-latest
            artifact_name: lfo-webui-macOS
            archive_ext: tar.gz
    
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel
          pip install .
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller build/pyinstaller.spec

      - name: Package artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          tar -czf ${{ matrix.artifact_name }}.tar.gz lfo-webui/

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path lfo-webui -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload artifact to Actions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/lfo-webui-*.*

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
