name: build-standalone

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: lfo-webui-ubuntu-latest
          - os: windows-latest
            artifact_name: lfo-webui-windows-latest
          - os: macos-13
            artifact_name: lfo-webui-macos-x64
          - os: macos-14
            artifact_name: lfo-webui-macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel
          pip install .
          pip install pyinstaller

      - name: Build (PyInstaller)
        shell: bash
        run: |
          pyinstaller build/pyinstaller.spec

      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/lfo-webui/**
