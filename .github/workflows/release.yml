name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            executable: lfo-webui-linux
            ext: ''
          - os: windows-latest
            executable: lfo-webui-windows.exe
            ext: '.exe'
          - os: macos-latest
            executable: lfo-webui-macos
            ext: ''
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pyinstaller
    
    - name: Build standalone executable
      run: |
        pyinstaller --onefile \
          --name ${{ matrix.executable }} \
          --hidden-import streamlit \
          --hidden-import openai \
          --hidden-import tqdm \
          --hidden-import dotenv \
          src/llm_folder_organizer/webui_entry.py
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: executable-${{ matrix.os }}
        path: dist/${{ matrix.executable }}${{ matrix.ext }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: executables
        pattern: executable-*
        merge-multiple: true
    
    - name: List files
      run: ls -la executables/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: executables/*
        generate_release_notes: true
        draft: false
        prerelease: false
